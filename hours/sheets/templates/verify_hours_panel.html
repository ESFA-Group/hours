{% extends "base.html" %}
{% load static %}
{% load connector_template_filters %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'sheets/css/jspreadsheet.css' %}">
<link rel="stylesheet" href="{% static 'sheets/css/jspreadsheet.datatables.css' %}">
<link rel="stylesheet" href="{% static 'sheets/css/jspreadsheet.theme.css' %}">
{% endblock extra_css %}
{% block body %}

<div class="px-4">
    <div class="row">

        <div class="col col-12 col-lg-4 mt-2">

            <div style="position: sticky; top: 10px;">
                <div class="d-flex justify-content-between" style="gap: 10px;">
                    <div class="flex-grow-1 text-center">
                        <strong>Year</strong>
                        <div class="mt-1">
                            <select name="year" id="year" class="form-select">
                            </select>
                        </div>
                    </div>
                    <div class="flex-grow-1 text-center">
                        <strong>Month</strong>
                        <div class="mt-1">
                            <select name="month" id="month" class="form-select">
                                {{ 1|render_month_options }}
                            </select>
                        </div>
                    </div>
                    <div class="flex-grow-1 text-center">
                        <strong>Staff Group</strong>
                        <div class="mt-1">
                            <select name="staff_group" id="staff_group" class="form-select">
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>


<!-- Success Modal -->
<div class="modal fade" id="successModal" data-bs-keyboard="false">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    Import Data Result
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close">
                </button>
            </div>
            <div class="modal-body">
                <p class="text-success">succesfully updated</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-success" data-bs-dismiss="modal" id="submit">
                    Ok
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Warrning Modal -->
<div class="modal fade" id="warningModal" data-bs-keyboard="false">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    Import Data Result
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close">
                </button>
            </div>
            <div class="modal-body">
                <p class="text-warning">partially updated ‼️</p>
                <p>Users not found:</p>
                <ul id="missing-users-list"></ul>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-success" data-bs-dismiss="modal" id="submit">
                    Ok
                </button>
            </div>
        </div>
    </div>
</div>

<script src="{% static 'sheets/js/esfa_persian_holidays.min.js' %}"></script>
<script src="{% static 'sheets/js/plotly-basic.min.js' %}"></script>
<script src="{% static 'sheets/js/jspreadsheet.min.js' %}"></script>
<script src="{% static 'sheets/js/templatesScripts/verify_hour_panel.js' %}"></script>
{% endblock body %}
